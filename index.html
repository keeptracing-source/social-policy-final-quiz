<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#183153">
<title>사회정책 기말 퀴즈 · 암기</title>
<style>
:root{
  --bg:#f5f1e8; --paper:#fffdf8; --ink:#1f2933; --muted:#667085;
  --line:#e2dccb; --navy:#183153; --blue:#315f8c; --red:#a53f32;
  --gold:#b7791f; --green:#2f7a55; --soft-blue:#eaf1f8; --soft-red:#f8ebe7;
  --soft-gold:#fbf2dc; --soft-green:#e7f3ec; --shadow:0 10px 30px rgba(51,42,28,.10);
  --ok:#2f7a55; --no:#a53f32;
}
[data-theme="dark"]{
  --bg:#0f141c; --paper:#1b2330; --ink:#eef2f7; --muted:#a7b0bd;
  --line:#33404f; --navy:#cfe0f5; --blue:#8fb6df; --red:#f0a89e;
  --gold:#e6bd6b; --green:#83cda4; --soft-blue:#22344a; --soft-red:#3f2a28;
  --soft-gold:#3d3320; --soft-green:#1f3a2c; --shadow:none;
  --ok:#83cda4; --no:#f0a89e;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:"Pretendard","Noto Sans KR","Apple SD Gothic Neo","Malgun Gothic",sans-serif;
  line-height:1.6;padding-bottom:env(safe-area-inset-bottom)}
button{font:inherit;cursor:pointer;border:none;background:none;color:inherit}

/* top bar */
.top{position:sticky;top:0;z-index:30;background:var(--navy);color:#fff;
  padding:calc(10px + env(safe-area-inset-top)) 14px 10px;display:flex;align-items:center;gap:10px;
  box-shadow:0 2px 14px rgba(0,0,0,.18)}
[data-theme="dark"] .top{background:#10182a}
.top h1{font-size:16px;margin:0;font-weight:800;letter-spacing:-.3px;flex:1;line-height:1.2}
.top h1 small{display:block;font-size:11px;font-weight:500;opacity:.8;margin-top:2px}
.iconbtn{width:38px;height:38px;border-radius:11px;background:rgba(255,255,255,.14);
  display:grid;place-items:center;font-size:17px;color:#fff;flex:none}
.iconbtn:active{transform:scale(.92)}

.wrap{max-width:680px;margin:0 auto;padding:14px 14px 90px}

/* mode tabs */
.modes{display:flex;gap:6px;overflow-x:auto;padding:4px 2px 8px;scrollbar-width:none}
.modes::-webkit-scrollbar{display:none}
.mode{flex:none;padding:9px 13px;border-radius:999px;background:var(--paper);
  border:1.5px solid var(--line);font-size:13.5px;font-weight:700;color:var(--muted);white-space:nowrap}
.mode.on{background:var(--navy);color:#fff;border-color:var(--navy)}
[data-theme="dark"] .mode.on{background:var(--blue);color:#0f141c;border-color:var(--blue)}

/* filter chips */
.filters{display:flex;gap:6px;overflow-x:auto;padding:6px 2px 10px;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.chip{flex:none;padding:6px 11px;border-radius:999px;background:var(--paper);
  border:1px solid var(--line);font-size:12.5px;font-weight:600;color:var(--muted);white-space:nowrap}
.chip.on{background:var(--soft-blue);color:var(--blue);border-color:var(--blue)}

/* progress meter */
.meter{display:flex;align-items:center;gap:10px;margin:2px 2px 12px;font-size:12.5px;color:var(--muted);font-weight:600}
.bar{flex:1;height:8px;background:var(--line);border-radius:99px;overflow:hidden}
.bar > i{display:block;height:100%;background:var(--green);width:0;transition:width .35s ease}

/* card */
.card{background:var(--paper);border:1px solid var(--line);border-radius:18px;
  box-shadow:var(--shadow);padding:22px 18px;min-height:230px;display:flex;flex-direction:column}
.tag{align-self:flex-start;font-size:11px;font-weight:800;padding:4px 9px;border-radius:7px;
  background:var(--soft-gold);color:var(--gold);margin-bottom:14px;letter-spacing:.2px}

/* flashcard */
.fc-term{font-size:23px;font-weight:800;letter-spacing:-.5px;flex:1;display:flex;align-items:center}
.fc-term>div{width:100%}
.fc-def{font-size:16px;line-height:1.72;color:var(--ink);flex:1;display:block;padding:6px 0;word-break:keep-all;overflow-wrap:anywhere}
.fc-def>div{width:100%}
.fc-hint{text-align:center;color:var(--muted);font-size:12.5px;margin-top:10px}
.fc-def b{color:var(--blue)}
.fc-def .hl{color:var(--red);font-weight:700}

/* quiz */
.q-text{font-size:17.5px;font-weight:700;line-height:1.55;margin-bottom:4px}
.q-num{font-size:12px;font-weight:800;color:var(--gold);margin-bottom:10px}
.options{display:flex;flex-direction:column;gap:9px;margin-top:16px}
.opt{text-align:left;padding:13px 14px;border-radius:13px;background:var(--paper);
  border:1.5px solid var(--line);font-size:15px;font-weight:600;display:flex;gap:10px;align-items:flex-start;transition:.15s}
.opt .k{font-weight:800;color:var(--blue);flex:none}
.opt:active{transform:scale(.99)}
.opt.correct{background:var(--soft-green);border-color:var(--green);color:var(--ink)}
.opt.wrong{background:var(--soft-red);border-color:var(--red);color:var(--ink)}
.opt.correct .k{color:var(--green)} .opt.wrong .k{color:var(--red)}
.opt.dim{opacity:.5}

/* OX big buttons */
.ox{display:flex;gap:12px;margin-top:20px}
.oxb{flex:1;padding:20px 0;border-radius:16px;font-size:30px;font-weight:800;border:2px solid var(--line);background:var(--paper)}
.oxb.o{color:var(--green)} .oxb.x{color:var(--red)}
.oxb:active{transform:scale(.96)}
.oxb.sel-correct{background:var(--soft-green);border-color:var(--green)}
.oxb.sel-wrong{background:var(--soft-red);border-color:var(--red)}

/* explanation */
.explain{margin-top:16px;padding:13px 14px;border-radius:13px;font-size:14px;line-height:1.65;display:none}
.explain.show{display:block;animation:fade .25s}
.explain.right{background:var(--soft-green);border:1px solid var(--green)}
.explain.bad{background:var(--soft-red);border:1px solid var(--red)}
.explain b{font-weight:800}
.verdict{font-weight:800;font-size:15px;margin-bottom:5px;display:block}
.right .verdict{color:var(--green)} .bad .verdict{color:var(--red)}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1}}

/* action row */
.actions{display:flex;gap:9px;margin-top:16px}
.btn{flex:1;padding:13px 0;border-radius:13px;font-size:14.5px;font-weight:800;text-align:center;
  background:var(--paper);border:1.5px solid var(--line);color:var(--ink)}
.btn.primary{background:var(--navy);color:#fff;border-color:var(--navy)}
[data-theme="dark"] .btn.primary{background:var(--blue);color:#0f141c;border-color:var(--blue)}
.btn.good{background:var(--soft-green);color:var(--green);border-color:var(--green)}
.btn.again{background:var(--soft-gold);color:var(--gold);border-color:var(--gold)}
.btn:active{transform:scale(.97)}
.btn.sm{flex:none;padding:10px 14px;font-size:13px}

.toolbar{display:flex;gap:8px;justify-content:center;margin-top:14px;flex-wrap:wrap}

/* essay list */
.acc{background:var(--paper);border:1px solid var(--line);border-radius:14px;margin-bottom:10px;overflow:hidden}
.acc > summary{padding:15px 16px;font-weight:700;font-size:15px;list-style:none;cursor:pointer;
  display:flex;gap:9px;align-items:flex-start}
.acc > summary::-webkit-details-marker{display:none}
.acc > summary .star{color:var(--gold);flex:none}
.acc[open] > summary{border-bottom:1px solid var(--line);background:var(--soft-blue)}
.acc .body{padding:14px 16px;font-size:14px;line-height:1.7}
.acc .body .lbl{font-weight:800;color:var(--blue);display:block;margin:10px 0 3px}
.acc .body .lbl:first-child{margin-top:0}
.acc .body ol{margin:4px 0 0;padding-left:20px} .acc .body li{margin-bottom:5px}
.kw{display:inline-block;background:var(--soft-gold);color:var(--gold);font-weight:700;
  font-size:12.5px;padding:3px 8px;border-radius:7px;margin:3px 4px 0 0}

/* stats */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-top:4px}
.stat{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:16px;text-align:center}
.stat .n{font-size:30px;font-weight:800;color:var(--navy);line-height:1.1}
[data-theme="dark"] .stat .n{color:var(--blue)}
.stat .l{font-size:12.5px;color:var(--muted);margin-top:5px;font-weight:600}
.note{font-size:12.5px;color:var(--muted);text-align:center;margin-top:18px;line-height:1.6}

.done{text-align:center;padding:30px 16px}
.done .big{font-size:40px;font-weight:800;color:var(--navy)}
[data-theme="dark"] .done .big{color:var(--blue)}
.done p{color:var(--muted);font-size:14px;margin:8px 0 18px}
.hidden{display:none!important}
</style>
</head>
<body>
<div class="top">
  <h1>사회정책 기말 퀴즈<small>9~13주차 · 한국 복지국가 핵심개념</small></h1>
  <button class="iconbtn" id="shuffleBtn" title="섞기">🔀</button>
  <button class="iconbtn" id="themeBtn" title="다크모드">🌙</button>
</div>

<div class="wrap">
  <div class="modes" id="modes">
    <button class="mode on" data-m="flash">📇 암기카드</button>
    <button class="mode" data-m="ox">⭕ OX 퀴즈</button>
    <button class="mode" data-m="mcq">🔢 객관식</button>
    <button class="mode" data-m="essay">📝 서술형</button>
    <button class="mode" data-m="stats">📊 진도</button>
  </div>

  <div class="filters" id="filters"></div>
  <div class="meter" id="meter"><span id="meterTxt">0 / 0</span><div class="bar"><i id="meterBar"></i></div><span id="meterRight"></span></div>

  <div id="stage"></div>
</div>

<script>
/* ============ DATA ============ */
const CATS = {
  all:"전체", w9:"9주 Pateman", w10:"10주 Esping", w11:"11주 생산주의",
  w12:"12주 청년빈곤", w13:"13주 돌봄·젠더", kr:"한국 복지국가"
};
const CATLABEL = {w9:"9주차 · Pateman",w10:"10주차 · Esping-Andersen",w11:"11주차 · Yang&Kühner",
  w12:"12주차 · 김수정",w13:"13주차 · doing gender·Hook(족보)",kr:"강의 · 한국 복지국가"};

/* --- 암기카드 --- */
const FLASH = [
 {c:"w9",t:"시민권 기준 '독립(Independence)'의 남성성",d:"Pateman: 시민권의 핵심 기준인 <b>독립</b>은 <span class='hl'>무기 소지·재산 소유·자치 능력</span> 등 철저히 남성적 속성으로 구성됐다. 여성은 그 반대인 '의존(Dependence)'으로 범주화되어 시민권에서 주변화된다."},
 {c:"w9",t:"독립의 3대 남성적 차원",d:"① 무기를 소지할 능력(국방·자기보호) ② 재산(자기 신체·노동력)을 소유할 능력(계약권) ③ 자치(self-government) 능력. 여성은 '일방적으로 무장해제'된 보호 대상으로 배치됐다."},
 {c:"w9",t:"생계부양자–전업주부 모델",d:"남성=노동력을 팔아 가족을 부양하는 <b>breadwinner</b>, 여성=경제적 의존자 <b>housewife</b>. 19세기 중반 영국 자본주의 발전과 함께 고착. 1911년 영국 인구조사는 전업주부를 경제활동인구에서 삭제."},
 {c:"w9",t:"가족임금(Family Wage)",d:"노동자 개인의 생계비가 아니라, <span class='hl'>전업주부의 무상 가사노동과 결합</span>해 현재·미래 노동력을 재생산하는 비용(가족 전체 생계비). 따라서 '노동계급' 개념 자체가 남성 노동자 집단으로 가부장적으로 구축됨."},
 {c:"w9",t:"복지국가의 2층 구조(Two-tier)",d:"<b>1층(주로 남성)</b>: 시장 기여 기반 '<span class='hl'>권리</span>'로서의 사회보장, 낙인 없음·급여 높음. <b>2층(주로 여성)</b>: 사적 의존·자산조사 기반 '<span class='hl'>시혜(handouts)</span>', 낙인 결부·급여 낮음."},
 {c:"w9",t:"울스턴크래프트의 딜레마",d:"여성 시민권 획득의 두 경로가 상호 모순됨. ① 남성과 '<b>동일</b>'해지는 길(전일제 임금노동 기준 동화)→'열등한 남성'으로 취급. ② '<b>여성으로서</b>' 차이(돌봄)를 인정받는 길→영원한 의존자로 고착. <span class='hl'>어느 쪽도 완전한 시민권에 도달 못 하는 구조적 함정.</span>"},
 {c:"w9",t:"베버리지의 남성 가장관",d:"1942년 베버리지 보고서: 기혼 여성 대다수는 '무상이지만 국가 존속에 vital한 노동'에 종사하며 그 보조 없이는 남편이 유상노동을 못 한다. 이상적 사회단위=남성 수입만으로 유지되는 가구. 1946 국민보험법은 기혼여성 75%를 독자 연금권에서 옵트아웃시킴."},
 {c:"w9",t:"동거 규칙(Cohabitation Rule)",d:"여성이 남성과 동거가 발각되면 국가가 '남성에게 경제적으로 의존'한다고 자동 규정→여성의 복지수표(Giro) 수급권을 박탈하고 남편이 주청구자가 됨. 경제적 통제권 상실로 빈곤 가중."},
 {c:"w9",t:"가족수당과 래스본(Rathbone)",d:"아동양육비를 국가가 '<span class='hl'>어머니에게 직접</span>' 지급하면 임금협상에서 부양의무를 분리→동일임금·여성 경제독립 달성 가능. 1946 영국 입법 때 여성단체 로비로 '아버지→어머니 직접 지급'으로 수정('지갑에서 핸드백으로의 재분배')."},

 {c:"w10",t:"탈상품화(De-commodification)",d:"개인이 시장에서 노동력을 팔지 않아도(고용·시장가치와 무관하게) <span class='hl'>인간다운 생계를 자율적으로 유지할 수 있는 권리의 실질 수준</span>. '내가 잘해서'가 아니라 '인간이라는 자격만으로' 생계가 보장되는 정도."},
 {c:"w10",t:"탈상품화의 측정",d:"위험(질병·실업·노령)에 직면했을 때 소득·복지 손실 없이 필요할 때 일에서 자유롭게 <b>탈퇴(opt out)</b>할 수 있는가. 주로 연금으로 측정: 급여가 표준노동자 임금에 근접? 기여기간 짧은가? 개인 기여분 비중 낮은가(국가 기여 큰가)? 자산조사 구빈법=탈상품화 0."},
 {c:"w10",t:"사회층화(Social Stratification)",d:"복지국가는 사후에 불평등을 교정하는 보조기구가 아니라, 정책 집행으로 <span class='hl'>계급관계를 직접 설계·서열화·단절 또는 연대</span>시키는 능동적 층화 기제다."},
 {c:"w10",t:"지출 착시(epiphenomenal) 비판",d:"단순 복지지출 규모는 <b>부수현상</b>. 오스트리아의 큰 지출=관료 특권 강화, 대처기 영국 지출 증가=대량실업 비용 방어, 민간복지 조세보조(tax expenditures)는 장부에 누락. 핵심은 '얼마'가 아니라 '<span class='hl'>어떻게</span>' 쓰느냐."},
 {c:"w10",t:"세 가지 복지레짐",d:"<b>자유주의</b>(미·캐·호): 시장우선·자산조사, 탈상품화 <span class='hl'>최소</span>. <b>보수주의/조합주의</b>(독·프·이): 직역별 사회보험·신분유지, <span class='hl'>중간</span>. <b>사민주의</b>(스웨덴·노르웨이·덴마크): 보편주의·연대, <span class='hl'>최대</span>."},
 {c:"w10",t:"계급동맹 구조(Class Coalitions)",d:"복지국가 도약은 단일계급 힘이 아니라 배링턴 무어식 <span class='hl'>가변적 계급동맹</span>이 결정. ① 적녹동맹(노동계급+가족농민, 스웨덴·노르웨이 대타협) ② 신중산층(화이트칼라) 포섭(관대한 제도로 시장복지 이탈 방지)."},
 {c:"w10",t:"권력자원이론의 한계",d:"노조 조직률·좌파 의석↑ = 복지↑ 라는 선형적 권력관의 오류(좌파 단독 과반은 산술적 불가). 탈산업화로 제조업 노동계급이 소수파로 전락. 종교정당으로 복지를 건설한 궤적을 '허위의식'으로 치부하는 <b>스웨덴 중심주의</b> 편향."},
 {c:"w10",t:"복지후퇴(Retrenchment)의 역설",d:"조세반발·복지 backlash는 지출이 큰 북유럽 사민주의가 아니라 <span class='hl'>지출이 작은 자유주의(미·영)에서 가장 격렬</span>. 자유주의는 중산층을 시장복지로 내쫓고 복지를 빈민 전용 시혜로 전락시켜, 다수 중산층이 복지기구를 적으로 인식하기 때문."},

 {c:"w11",t:"생산주의(Productivism)",d:"동아시아 복지의 특성. 사회적 보호 자체보다 인적자본 축적·기술형성을 위한 <span class='hl'>사회투자(Social Investment)</span>에 집중하고, 복지를 경제성장·국제경쟁력 확보의 종속기구로 설계."},
 {c:"w11",t:"생산주의의 한계(Gough 2004)",d:"외환위기(1997) 이후 ① 기업복지(Corporate welfare) 퇴조 ② 저출산·고령화로 가족돌봄 해체 ③ 소득 양극화. 두 갈래 경로: (1) 시장·워크페어적 민영화 (2) 보편적 사회투자·국가 재분배 강화."},
 {c:"w11",t:"FSITA(퍼지셋 이상형 분석)",d:"동아시아 6개국(중·홍·일·한·싱·대) 1990~2016 원자료를 퍼지셋 수치로 보정. <span class='hl'>생산적 차원</span>(교육·보건·가족정책) + <span class='hl'>보호적 차원</span>(연금·공공주택·소극적 노동시장정책) 6대 영역. 2⁶=64 이상형."},
 {c:"w11",t:"교집합 규칙(Fuzzy AND)",d:"교육·보건·연금·노동시장 점수는 하위지표 중 '<span class='hl'>가장 낮은 최소값</span>'에 구속됨(한 차원 강점이 다른 약점을 보완 못 함). 예: 교육 투자·관대성 1.00이어도 고등교육 접근성 0.40이면 최종 0.40. ※가족정책(F)만 예외로 평균값 규칙."},
 {c:"w11",t:"한국 = 동아시아 '최선 사례'",d:"궤적: '약한 복지(Underdeveloped)' → '약한 생산적 균형 모델'. 30년간 <span class='hl'>가장 길고 전방위적인 양적 전진</span>, 생산적+보호적 요소 동시 확충. 의무교육·국가장학금·고용보험·기초연금·공공임대 등. ADB가 공인한 Best Practice."},
 {c:"w11",t:"동아시아 6개국 궤적 한 줄 요약",d:"<b>한국</b>=가장 균형 잡힌 확장 / <b>중국</b>=시장화 후퇴 후 연금·출산 중심 복귀(가족정책 .72 최고) / <b>일본</b>=공공주택·교육 쇠퇴, 아빠 육아휴직(30.4주 1위) / <b>싱가포르</b>=주택·교육 철옹성+실업급여·공적연금 0 / <b>홍콩</b>=현상유지 / <b>대만</b>=홀로 보호적(실업·연금·NHI)."},

 {c:"w12",t:"빈곤의 청년화(Juvenilization of Poverty)",d:"1980년대 중반 이후 선진 복지국가에서 노인빈곤은 연금 성숙으로 하락한 반면, 노동시장 이중구조·불안정노동 확산으로 <span class='hl'>초기 청년층(18~25세)이 새로운 최취약 계층</span>으로 부상하는 보편적 트렌드."},
 {c:"w12",t:"한국 청년빈곤의 통계 착시",d:"청년(20~34세) 상대빈곤율 7.7% < 전체 12.8%로 오히려 낮게 보이는 역설. 원인 ① <span class='hl'>OECD 1위 노인빈곤(40%대)</span>이 중위소득·빈곤선 자체를 하향 ② 청년이 부모와 동거해 위험을 가구 안에 은폐('지연되고 은폐된 평화')."},
 {c:"w12",t:"빈곤 페널티(AME)",d:"승산비(OR)는 집단 간 비관측 이질성 때문에 국가 간 직접 비교 불가→<span class='hl'>평균한계효과(AME, ΔP)</span>로 측정. 정의: 다른 변수를 모두 통제했을 때 특정 리스크(실업·저학력·가구분리)를 추가로 가짐으로써 짊어지는 빈곤확률의 실질 증가분."},
 {c:"w12",t:"혼인의 자기선택 효과",d:"<span class='hl'>전 세계에서 오직 한국만</span> 기혼청년이 부모동거청년보다 빈곤위험이 낮음(음의 페널티 −2.7%P). 혼인의 구제력이 아니라, 결혼·독립에 진입할 수 있는 청년 자체가 부모자산·일자리 양호한 <b>중산층 이상으로 선별</b>된 계급적 결과(결혼=계급적 특권)."},
 {c:"w12",t:"한국의 독립 페널티",d:"다른 조건 통제 시 혼자 독립하면 빈곤위험 <span class='hl'>+20.6%P 급등</span>. 미혼 단독가구 비율 9.1%로 비교국 중 최하위. 청년이 독립가구를 구축할 인프라(괜찮은 일자리·주거복지·안전망)가 파탄났음을 반증."},
 {c:"w12",t:"근로빈곤층(Working Poor)의 함정",d:"한국 실업 페널티가 +11.7%P로 기묘하게 낮음=청년고용이 양호해서가 절대 아님. 취업해도 비정규(3개 중 1개)·저임금(20대 27%)이라 '<span class='hl'>취업하나 실업이나 가처분소득 차이가 거의 없는</span>' 근로빈곤 양산 구조의 비극적 지표."},

 {c:"w13",t:"doing gender (West & Zimmerman)",d:"젠더는 고정된 속성·역할이 아니라 일상의 상호작용 속에서 반복적으로 '<span class='hl'>수행(performed)</span>'되며 구성되는 것. 가사노동 분담은 효율·비교우위 논리가 아니라 <b>젠더 정체성을 수행·확인</b>하는 과정으로 결정된다. <b>(★족보 5번)</b>"},
 {c:"w13",t:"doing gender의 역설 — 소득 높은 아내",d:"소득이 더 높은 아내가 오히려 가사를 더 많이 하는 현상. 효율·비교우위론으로는 설명 불가. '<span class='hl'>더 버니까 성역할을 보상해야 한다</span>'는 젠더 수행 논리로 설명된다(doing gender의 강력한 증거)."},
 {c:"w13",t:"Hook — 돌봄시간 격차의 사회정책 요소",d:"남녀 돌봄시간 격차는 개인 태도가 아니라 <b>사회정책 설계</b>가 좌우(Hook). ① 육아휴직의 <span class='hl'>아빠 할당(비이전·전용)</span> 여부 ② 공공 보육 서비스(없으면 여성이 공백을 메움) ③ 노동시간 규제(전반 단축이 남녀 돌봄 참여 여지). <b>(★족보 4번)</b>"},
 {c:"w13",t:"아빠 할당제 (use it or lose it)",d:"남성에게 할당된 육아휴직을 <span class='hl'>쓰지 않으면 소멸(비이전·전용)</span>시키는 방식. 할당이 없으면 휴직이 여성에게 집중돼 돌봄 불평등이 고착. 돌봄시간 성별 격차를 줄이는 결정적 정책."},
 {c:"w13",t:"돌봄 평등 모범국 / 양현아 한국 사례",d:"돌봄시간 성별 격차가 작은 대표 국가는 <b>덴마크·노르웨이(스웨덴)</b> — 아빠 할당+보편 공공보육+단축 노동시간 결합. 반대로 한국은 양현아(2021)의 '<span class='hl'>젠더화된 부모상</span>'처럼 아빠할당·공공보육이 약해 휴직이 여성에 집중(제도가 젠더 수행을 강화)."},

 {c:"kr",t:"국가중심주의(한국 복지 형성)",d:"한국 복지는 노동운동·시민의 '아래로부터' 요구가 아니라, <span class='hl'>박정희 이래 국가가 위로부터 경제전략에 묶어</span> 도입. 공화국·정권별로 복지가 결정됨."},
 {c:"kr",t:"산재보험 우선(1963 제정)",d:"한국에서 가장 먼저 도입된 사회보험은 <span class='hl'>산재보험</span>. 저임금 경공업 노동자를 직접 지원해야 했던 비스마르크식 산업화 전략과 맞물림. 같은 해 의료보험은 강제조항 없는 임의규정이라 사실상 미시행."},
 {c:"kr",t:"국가 재정기여 사실상 0",d:"서구는 국가·고용주·노동자가 1/3씩 부담했으나 한국은 <span class='hl'>국가 몫이 사실상 부재</span>(가입자·사용자 중심)→급여 낮고 비급여·본인부담 큼. '제도는 완비됐는데 지출·체감은 낮은' 모순의 핵심 원인. ※기초연금·의료급여 등 일부 조세재원은 예외."},
 {c:"kr",t:"선별적·점진적 확대",d:"복지가 가장 덜 필요한 <span class='hl'>대기업(500인↑)부터</span> 시작→50년+에 걸쳐 중소·1인·비정규·자영업으로 확대. 국가는 공무원·군인 연금으로 자기 자신을 먼저 보호."},
 {c:"kr",t:"복지가 민주화보다 먼저",d:"한국은 복지가 <span class='hl'>권위주의 정당성 도구</span>로 민주화(1987) '이전'에 도입되고, 민주화가 사후에 복지를 재편. 비스마르크 독일처럼 권위주의 체제가 사회주의·노동 동원을 막으려 선제 도입한 서구 초기 패턴과 통하며, 서구의 '민주화→복지'와는 반대 경로."},
 {c:"kr",t:"한국 복지 발전 연표",d:"산재보험 1963 제정·64 시행 → 의료보험 1977(500인↑ 직장) → 국민연금 1973 제정·1988 시행 → 고용보험 1995. 모두 대기업·정규직부터 선별 도입, 국가 재정기여 미약."},
 {c:"kr",t:"돌봄의 난제 (국가–시장–가족)",d:"복지국가 과제가 '탈상품화(시장)'에서 '<span class='hl'>돌봄(가족)</span>'으로 이동. 기업 노동은 법·벌금(주52시간)으로 규율 가능하나, 가족 내부의 돌봄 분담을 국가가 강제하면 <b>인권·민주주의 침해</b>가 됨→시장에서 쓰던 도구가 가족에선 안 통하는 '마지막 난제'."}
];

 {c:"w10",q:"자유주의 복지레짐(미국·캐나다·호주)은 탈상품화 수준이 가장 높다.",a:false,e:"자유주의는 자산조사·시장 우선으로 탈상품화가 <b>가장 낮다</b>. 최대는 사민주의(스웨덴·노르웨이·덴마크)."},
 {c:"w10",q:"보수주의/조합주의 레짐은 직역별 사회보험으로 시장 임금격차를 복지격차로 전이시킨다.",a:true,e:"기여 비례 방식이 직업·신분 격차를 그대로 복지격차로 옮겨 계층을 재생산한다(탈상품화 중간)."},
 {c:"w10",q:"복지 후퇴(조세반발)는 복지지출이 가장 큰 북유럽 사민주의에서 가장 격렬하게 터진다.",a:false,e:"반대다. <b>지출이 작은 자유주의(미·영)에서 가장 격렬</b>. 중산층을 시장복지로 내쫓아 복지를 빈민 전용 시혜로 전락시켰기 때문."},
 {c:"w10",q:"에스핑-안데르센은 복지국가의 도약을 단일 노동계급의 힘만으로 설명했다.",a:false,e:"배링턴 무어식 <b>가변적 계급동맹</b>(적녹동맹·신중산층 포섭)으로 설명했다. 권력자원이론의 선형적 권력관을 비판."},
 {c:"w9",q:"Pateman에 따르면 시민권의 기준인 '독립(independence)'은 젠더중립적으로 구성되었다.",a:false,e:"독립은 무기 소지·재산 소유·자치 등 <b>철저히 남성적 속성</b>으로 구성됐고, 여성은 '의존'으로 범주화됐다."},
 {c:"w9",q:"울스턴크래프트의 딜레마는 여성이 일과 가정을 시간상 병행하기 어렵다는 뜻이다.",a:false,e:"단순 양립 문제가 아니다. 동화의 길도 차이인정의 길도 <b>어느 쪽도 완전한 시민권에 도달 못 하는</b> 구조적 함정이다."},
 {c:"w9",q:"베버리지 보고서는 기혼 여성의 무상 가사노동을 국가 존속에 필수적인 것으로 보았다.",a:true,e:"1942년 보고서에서 '기혼 여성 대다수는 무상이지만 국가에 vital한 노동에 종사'한다고 명시했다. 다만 그 노동을 권리가 아닌 의존으로 처리했다."},
 {c:"w9",q:"복지국가의 2층 구조에서 남성은 '시혜·낙인'의 공공부조를, 여성은 '권리'로서의 사회보험을 받는다.",a:false,e:"정반대. <b>남성=권리로서 사회보험(1층), 여성=시혜·낙인의 자산조사 급여(2층)</b>."},

/* ============ STATE ============ */
const LS = {
  get k(){return JSON.parse(localStorage.getItem('sp_known')||'[]')},
  set k(v){localStorage.setItem('sp_known',JSON.stringify(v))},
  get ox(){return JSON.parse(localStorage.getItem('sp_ox')||'{"right":0,"wrong":0}')},
  set ox(v){localStorage.setItem('sp_ox',JSON.stringify(v))},
  get mcq(){return JSON.parse(localStorage.getItem('sp_mcq')||'{"right":0,"wrong":0}')},
  set mcq(v){localStorage.setItem('sp_mcq',JSON.stringify(v))}
};
let mode='flash', filter='all';
let fcList=[], fcIdx=0, fcFlip=false;
let oxList=[], oxIdx=0, oxAnswered=false;
let mcList=[], mcIdx=0, mcAnswered=false;

const $=s=>document.querySelector(s);
const stage=$('#stage');
function byFilter(arr){return filter==='all'?arr.slice():arr.filter(x=>x.c===filter)}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]]}return a}

/* theme */
function initTheme(){const t=localStorage.getItem('sp_theme')||'light';
  document.documentElement.setAttribute('data-theme',t);
  $('#themeBtn').textContent=t==='dark'?'☀️':'🌙'}
$('#themeBtn').onclick=()=>{const cur=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',cur);localStorage.setItem('sp_theme',cur);
  $('#themeBtn').textContent=cur==='dark'?'☀️':'🌙'};

/* filters */
function renderFilters(){
  const show = mode==='flash'||mode==='ox'||mode==='mcq';
  $('#filters').classList.toggle('hidden',!show);
  $('#meter').classList.toggle('hidden',!show);
  if(!show)return;
  $('#filters').innerHTML=Object.entries(CATS).map(([k,v])=>
    `<button class="chip ${filter===k?'on':''}" data-f="${k}">${v}</button>`).join('');
  $('#filters').querySelectorAll('.chip').forEach(b=>b.onclick=()=>{filter=b.dataset.f;rebuild()});
}

/* modes nav */
$('#modes').querySelectorAll('.mode').forEach(b=>b.onclick=()=>{
  mode=b.dataset.m;
  $('#modes').querySelectorAll('.mode').forEach(x=>x.classList.toggle('on',x===b));
  rebuild();
});
$('#shuffleBtn').onclick=()=>{
  if(mode==='flash'){shuffle(fcList);fcIdx=0;fcFlip=false;renderFlash()}
  else if(mode==='ox'){shuffle(oxList);oxIdx=0;oxAnswered=false;renderOX()}
  else if(mode==='mcq'){shuffle(mcList);mcIdx=0;mcAnswered=false;renderMCQ()}
};

function rebuild(){
  renderFilters();
  if(mode==='flash'){fcList=byFilter(FLASH);fcIdx=0;fcFlip=false;renderFlash()}
  else if(mode==='ox'){oxList=shuffle(byFilter(OX));oxIdx=0;oxAnswered=false;renderOX()}
  else if(mode==='mcq'){mcList=shuffle(byFilter(MCQ));mcIdx=0;mcAnswered=false;renderMCQ()}
  else if(mode==='essay'){renderEssay()}
  else if(mode==='stats'){renderStats()}
}
function setMeter(cur,total,right){
  $('#meterTxt').textContent=`${cur} / ${total}`;
  $('#meterBar').style.width=total?`${cur/total*100}%`:'0';
  $('#meterRight').textContent=right||'';
}

/* ---- FLASHCARDS ---- */
function fcId(card){return FLASH.indexOf(card)}
function renderFlash(){
  const known=LS.k;
  if(!fcList.length){stage.innerHTML='<div class="card"><p>카드가 없습니다.</p></div>';return}
  if(fcIdx>=fcList.length){
    stage.innerHTML=`<div class="card done"><div class="big">🎉</div>
      <p>이 묶음 ${fcList.length}장 학습 완료!<br>외운 카드 ${fcList.filter(c=>LS.k.includes(fcId(c))).length}장</p>
      <div class="actions"><button class="btn primary" onclick="fcRestart()">처음부터</button>
      <button class="btn" onclick="fcOnlyUnknown()">모르는 것만</button></div></div>`;
    setMeter(fcList.length,fcList.length,'');return;
  }
  const c=fcList[fcIdx], id=fcId(c), isKnown=known.includes(id);
  setMeter(fcIdx+1,fcList.length,`외움 ${fcList.filter(x=>known.includes(fcId(x))).length}`);
  stage.innerHTML=`
    <div class="card" id="fcard">
      <span class="tag">${CATLABEL[c.c]}${isKnown?' · ✅외움':''}</span>
      ${fcFlip
        ? `<div class="fc-def"><div>${c.d}</div></div><div class="fc-hint">탭하면 개념으로 돌아갑니다</div>`
        : `<div class="fc-term"><div>${c.t}</div></div><div class="fc-hint">👆 카드를 탭하면 정의가 나옵니다</div>`}
    </div>
    <div class="actions">
      <button class="btn again" onclick="fcNext(false)">🔁 다시</button>
      <button class="btn good" onclick="fcNext(true)">✅ 외웠어요</button>
    </div>
    <div class="toolbar">
      <button class="btn sm" onclick="fcPrev()">← 이전</button>
      <button class="btn sm" onclick="fcSkip()">건너뛰기 →</button>
    </div>`;
  $('#fcard').onclick=()=>{fcFlip=!fcFlip;renderFlash()};
}
function fcNext(learned){
  const c=fcList[fcIdx], id=fcId(c); let k=LS.k;
  if(learned){if(!k.includes(id))k.push(id)} else {k=k.filter(x=>x!==id)}
  LS.k=k; fcIdx++; fcFlip=false; renderFlash();
}
function fcSkip(){fcIdx++;fcFlip=false;renderFlash()}
function fcPrev(){if(fcIdx>0)fcIdx--;fcFlip=false;renderFlash()}
function fcRestart(){fcIdx=0;fcFlip=false;renderFlash()}
function fcOnlyUnknown(){const k=LS.k;fcList=byFilter(FLASH).filter(c=>!k.includes(fcId(c)));
  if(!fcList.length){fcList=byFilter(FLASH)} shuffle(fcList);fcIdx=0;fcFlip=false;renderFlash()}

/* ---- OX ---- */
function renderOX(){
  if(!oxList.length){stage.innerHTML='<div class="card"><p>문제가 없습니다.</p></div>';return}
  if(oxIdx>=oxList.length){return oxDone()}
  const q=oxList[oxIdx];
  setMeter(oxIdx+1,oxList.length,`정답 ${LS.ox.right}·오답 ${LS.ox.wrong}`);
  stage.innerHTML=`
    <div class="card">
      <span class="tag">${CATLABEL[q.c]}</span>
      <div class="q-num">OX ${oxIdx+1} / ${oxList.length}</div>
      <div class="q-text">${q.q}</div>
      <div class="ox">
        <button class="oxb o" id="oxO">⭕</button>
        <button class="oxb x" id="oxX">❌</button>
      </div>
      <div class="explain" id="oxExp"></div>
    </div>
    <div class="actions hidden" id="oxNextRow">
      <button class="btn primary" id="oxNext">다음 →</button>
    </div>`;
  $('#oxO').onclick=()=>oxAns(true);
  $('#oxX').onclick=()=>oxAns(false);
}
function oxAns(pick){
  if(oxAnswered)return; oxAnswered=true;
  const q=oxList[oxIdx], ok=(pick===q.a);
  const exp=$('#oxExp'); const s=LS.ox;
  if(ok)s.right++;else s.wrong++; LS.ox=s;
  const oCls=q.a?'sel-correct':(pick===true?'sel-wrong':'');
  const xCls=!q.a?'sel-correct':(pick===false?'sel-wrong':'');
  if(oCls)$('#oxO').classList.add(oCls);
  if(xCls)$('#oxX').classList.add(xCls);
  exp.className='explain show '+(ok?'right':'bad');
  exp.innerHTML=`<span class="verdict">${ok?'✅ 정답!':'❌ 오답'} · 정답은 ${q.a?'⭕ (맞다)':'❌ (틀리다)'}</span>${q.e}`;
  $('#oxNextRow').classList.remove('hidden');
  $('#oxNext').onclick=()=>{oxIdx++;oxAnswered=false;renderOX()};
}
function oxDone(){
  const tot=oxList.length;
  stage.innerHTML=`<div class="card done"><div class="big">⭕❌</div>
    <p>OX 퀴즈 ${tot}문 완료!<br>이번 라운드를 끝냈습니다.</p>
    <div class="actions"><button class="btn primary" onclick="oxRestart()">다시 풀기</button></div></div>`;
  setMeter(tot,tot,`누적 정답 ${LS.ox.right}·오답 ${LS.ox.wrong}`);
}
function oxRestart(){oxList=shuffle(byFilter(OX));oxIdx=0;oxAnswered=false;renderOX()}

/* ---- MCQ ---- */
const KEYS=['A','B','C','D'];
function renderMCQ(){
  if(!mcList.length){stage.innerHTML='<div class="card"><p>문제가 없습니다.</p></div>';return}
  if(mcIdx>=mcList.length){return mcDone()}
  const q=mcList[mcIdx];
  setMeter(mcIdx+1,mcList.length,`정답 ${LS.mcq.right}·오답 ${LS.mcq.wrong}`);
  stage.innerHTML=`
    <div class="card">
      <span class="tag">${CATLABEL[q.c]}</span>
      <div class="q-num">객관식 ${mcIdx+1} / ${mcList.length}</div>
      <div class="q-text">${q.q}</div>
      <div class="options" id="opts">
        ${q.o.map((t,i)=>`<button class="opt" data-i="${i}"><span class="k">${KEYS[i]}</span><span>${t}</span></button>`).join('')}
      </div>
      <div class="explain" id="mcExp"></div>
    </div>
    <div class="actions hidden" id="mcNextRow">
      <button class="btn primary" id="mcNext">다음 →</button>
    </div>`;
  $('#opts').querySelectorAll('.opt').forEach(b=>b.onclick=()=>mcAns(+b.dataset.i));
}
function mcAns(pick){
  if(mcAnswered)return; mcAnswered=true;
  const q=mcList[mcIdx], ok=(pick===q.a), s=LS.mcq;
  if(ok)s.right++;else s.wrong++; LS.mcq=s;
  $('#opts').querySelectorAll('.opt').forEach((b,i)=>{
    if(i===q.a)b.classList.add('correct');
    else if(i===pick)b.classList.add('wrong');
    else b.classList.add('dim');
    b.style.pointerEvents='none';
  });
  const exp=$('#mcExp');
  exp.className='explain show '+(ok?'right':'bad');
  exp.innerHTML=`<span class="verdict">${ok?'✅ 정답!':'❌ 오답 · 정답은 '+KEYS[q.a]}</span>${q.e}`;
  $('#mcNextRow').classList.remove('hidden');
  $('#mcNext').onclick=()=>{mcIdx++;mcAnswered=false;renderMCQ()};
}
function mcDone(){
  const tot=mcList.length;
  stage.innerHTML=`<div class="card done"><div class="big">🔢</div>
    <p>객관식 ${tot}문 완료!</p>
    <div class="actions"><button class="btn primary" onclick="mcRestart()">다시 풀기</button></div></div>`;
  setMeter(tot,tot,`누적 정답 ${LS.mcq.right}·오답 ${LS.mcq.wrong}`);
}
function mcRestart(){mcList=shuffle(byFilter(MCQ));mcIdx=0;mcAnswered=false;renderMCQ()}

/* ---- ESSAY ---- */
function renderEssay(){
  stage.innerHTML=`<p class="note" style="text-align:left;margin:0 2px 12px;font-size:13px">
    서술형 ${ESSAY.length}문 · <b>⭐ = 실제 기말 족보 기출 5선(최우선)</b>, 나머지는 예상·연결 문항. 질문을 먼저 떠올리고, 펼쳐서 <b>핵심 키워드 → 답안 뼈대(개념정의→비교→국가사례)</b> 순으로 점검하세요.</p>` +
    ESSAY.map((e,i)=>`
    <details class="acc">
      <summary>${e.star?'<span class="star">⭐</span>':'<span class="star" style="opacity:.25">•</span>'}<span>${i+1}. ${e.t}</span></summary>
      <div class="body">
        <span class="lbl">문제</span>${e.q}
        <span class="lbl">핵심 키워드</span>${e.kw.map(k=>`<span class="kw">${k}</span>`).join('')}
        <span class="lbl">답안 뼈대</span>
        <ol>${e.out.map(o=>`<li>${o}</li>`).join('')}</ol>
      </div>
    </details>`).join('');
}

/* ---- STATS ---- */
function renderStats(){
  const total=FLASH.length, known=LS.k.length;
  const ox=LS.ox, mc=LS.mcq;
  const oxAcc=ox.right+ox.wrong?Math.round(ox.right/(ox.right+ox.wrong)*100):0;
  const mcAcc=mc.right+mc.wrong?Math.round(mc.right/(mc.right+mc.wrong)*100):0;
  stage.innerHTML=`
    <div class="stat-grid">
      <div class="stat"><div class="n">${known}<span style="font-size:16px;color:var(--muted)">/${total}</span></div><div class="l">외운 암기카드</div></div>
      <div class="stat"><div class="n">${Math.round(known/total*100)||0}%</div><div class="l">암기 진도율</div></div>
      <div class="stat"><div class="n">${oxAcc}%</div><div class="l">OX 정답률 (${ox.right}/${ox.right+ox.wrong})</div></div>
      <div class="stat"><div class="n">${mcAcc}%</div><div class="l">객관식 정답률 (${mc.right}/${mc.right+mc.wrong})</div></div>
    </div>
    <div class="card" style="min-height:auto;margin-top:14px">
      <span class="tag">학습 팁</span>
      <div style="font-size:14px;line-height:1.75">
        1) <b>암기카드</b>로 핵심개념을 '외웠어요/다시'로 분류 → '모르는 것만' 반복.<br>
        2) <b>OX·객관식</b>으로 헷갈리는 함정(레짐 비교·한국 발전사·젠더)을 점검.<br>
        3) <b>서술형 ⭐ 족보 기출 5선</b>(탈상품화·Pateman 2층·울스턴크래프트·Hook 돌봄시간·doing gender)을 키워드 외운 뒤 직접 써보기.<br>
        진도는 이 기기 브라우저에 자동 저장됩니다.
      </div>
    </div>
    <div class="actions" style="margin-top:14px">
      <button class="btn" onclick="resetAll()">진도 초기화</button>
      <button class="btn primary" onclick="document.querySelector('[data-m=flash]').click()">암기카드로 →</button>
    </div>
    <p class="note">실제 기말 족보 기출 5선 + 9~13주차 리딩(Pateman · Esping-Andersen · Yang&amp;Kühner · 김수정 · doing gender·Hook) + 한국 복지국가 강의 기반 · 암기카드 ${FLASH.length} · OX ${OX.length} · 객관식 ${MCQ.length} · 서술형 ${ESSAY.length}</p>`;
}
function resetAll(){
  if(confirm('암기카드 외움 표시와 퀴즈 정답률을 모두 초기화할까요?')){
    LS.k=[]; LS.ox={right:0,wrong:0}; LS.mcq={right:0,wrong:0}; renderStats();
  }
}

/* init */
initTheme(); rebuild();
</script>
</body>
</html>
